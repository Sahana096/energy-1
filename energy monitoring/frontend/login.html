<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EnergyAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(255,215,0,0.15);
        }
        .login-brand {
            flex: 1;
            background: linear-gradient(135deg,#111 0%,#1a1a00 100%);
            border: 1px solid #2a2a2a;
            border-right: none;
            border-radius: 1.5rem 0 0 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
        }
        .brand-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg,#FFD700,#b8960c);
            border-radius: 1.25rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: #000; margin-bottom: 1.5rem;
        }
        .login-brand h1 { font-size: 2rem; color: #FFD700; margin-bottom: 0.75rem; }
        .login-brand p  { font-size: 0.95rem; color: #aaa; line-height: 1.6; }
        .brand-features { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
        .brand-feature  { display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: #aaa; }
        .brand-feature i { color: #FFD700; width: 20px; }

        .login-form-panel {
            flex: 1;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 0 1.5rem 1.5rem 0;
            display: flex; flex-direction: column; justify-content: center;
            padding: 3rem;
        }
        /* Tab switcher */
        .tab-switcher {
            display: flex; gap: 0.5rem;
            background: #1a1a1a; padding: 0.25rem;
            border-radius: 0.5rem; margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1; padding: 0.6rem;
            border: none; border-radius: 0.4rem;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: linear-gradient(135deg,#FFD700,#b8960c); color: #000; }
        .tab-btn.inactive { background: transparent; color: #aaa; }

        .login-form-panel h2 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .error-msg {
            background: rgba(255,107,53,0.15);
            border: 1px solid rgba(255,107,53,0.4);
            color: #ff6b35;
            padding: 0.75rem 1rem; border-radius: 0.5rem;
            font-size: 0.85rem; margin-bottom: 1rem;
            display: none; align-items: center; gap: 0.5rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 0.9rem; }
        .input-wrapper input {
            width: 100%; padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 0.6rem; color: #fff; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        .input-wrapper input:focus { border-color: #FFD700; }
        .toggle-password {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #aaa; cursor: pointer;
        }
        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; font-size: 0.85rem;
        }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: #aaa; }
        .remember-me input { accent-color: #FFD700; }
        .forgot-link { color: #FFD700; text-decoration: none; }
        .btn-login {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg,#FFD700,#b8960c);
            color: #000; border: none; border-radius: 0.6rem;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .signup-link { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #aaa; }
        .signup-link a { color: #FFD700; text-decoration: none; font-weight: bold; }
        @media (max-width: 640px) {
            .login-brand { display: none; }
            .login-form-panel { border-radius: 1.5rem; }
            .login-wrapper { max-width: 420px; margin: 1rem; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Branding -->
        <div class="login-brand">
            <div class="brand-icon"><i class="fas fa-bolt"></i></div>
            <h1>EnergyAI</h1>
            <p>Smart energy monitoring powered by AI</p>
            <div class="brand-features">
                <div class="brand-feature"><i class="fas fa-chart-line"></i><span>Real-time consumption tracking</span></div>
                <div class="brand-feature"><i class="fas fa-brain"></i><span>AI-powered predictions</span></div>
                <div class="brand-feature"><i class="fas fa-lightbulb"></i><span>Personalized recommendations</span></div>
                <div class="brand-feature"><i class="fas fa-leaf"></i><span>CO₂ footprint monitoring</span></div>
            </div>
        </div>

        <!-- Form -->
        <div class="login-form-panel">
            <!-- User / Admin tabs -->
            <div class="tab-switcher">
                <button type="button" class="tab-btn active" id="userTab" onclick="switchLoginTab('user')">
                    <i class="fas fa-user"></i> User Login
                </button>
                <button type="button" class="tab-btn inactive" id="adminTab" onclick="switchLoginTab('admin')">
                    <i class="fas fa-user-shield"></i> Admin Login
                </button>
            </div>

            <h2 id="loginTitle">Welcome back</h2>
            <p class="subtitle" id="loginSubtitle">Sign in to your EnergyAI account</p>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid email or password.</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required autocomplete="current-password" placeholder="Enter your password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="signup-link" id="signupLink">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        if (getToken() && getSession()) {
            window.location.href = 'index.html';
        }

        // Override redirectAfterLogin for standalone login page
        function redirectAfterLogin(user) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
